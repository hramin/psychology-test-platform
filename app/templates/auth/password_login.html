{% extends "base.html" %}
{% block title %}ورود با گذرواژه — سامانه آزمون‌های روان‌شناختی{% endblock %}
{% block content %}
<div class="card" style="max-width:28rem;margin:2rem auto;">
  <h2 class="card-title">ورود با نام کاربری و گذرواژه</h2>
  {% include "auth/_password_login_form.html" %}
  <div class="auth-links">
    <a href="/auth/login?next={{ next|urlencode }}">ورود با کد یک‌بارمصرف پیامکی</a>
    <a href="/auth/forgot?next={{ next|urlencode }}">گذرواژه‌ام را فراموش کرده‌ام</a>
  </div>
</div>
{% endblock %}
