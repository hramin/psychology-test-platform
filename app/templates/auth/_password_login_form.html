<div id="auth-area">
  {% if error %}<div class="alert">{{ error }}</div>{% endif %}
  <form hx-post="/auth/login/password" hx-target="#auth-area" hx-swap="outerHTML">
    <input type="hidden" name="_csrf" value="{{ csrf_token }}">
    <input type="hidden" name="next" value="{{ next }}">
    <div class="field">
      <label>نام کاربری یا شماره موبایل</label>
      <input type="text" name="identifier" dir="ltr" autocomplete="username"
             value="{{ identifier }}" required autofocus>
    </div>
    <div class="field">
      <label>گذرواژه</label>
      <input type="password" name="password" autocomplete="current-password" required>
    </div>
    <button type="submit" class="btn block">ورود</button>
  </form>
</div>
