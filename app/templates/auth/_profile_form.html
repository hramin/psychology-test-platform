<div id="profile-area">
  {% if saved %}
  <div class="alert" style="background:var(--ok-bg);color:var(--brand-700);border-color:var(--brand-100)">
    اطلاعات با موفقیت ذخیره شد.
  </div>
  {% endif %}
  <div class="field">
    <label>شماره موبایل</label>
    <input type="text" dir="ltr" value="{{ user.phone }}" readonly>
  </div>
  {% if user.is_admin %}<p class="lead">سطح دسترسی: مدیر سامانه</p>{% endif %}

  <form hx-post="/auth/profile" hx-target="#profile-area" hx-swap="outerHTML">
    <input type="hidden" name="_csrf" value="{{ csrf_token }}">
    <div class="field">
      <label>نام کاربری</label>
      <input type="text" name="username" value="{{ user.username or '' }}" placeholder="نام کاربری">
    </div>
    <div class="field">
      <label>نام و نام خانوادگی</label>
      <input type="text" name="full_name" value="{{ user.full_name or '' }}" placeholder="نام و نام خانوادگی">
    </div>
    <div class="field">
      <label>ایمیل</label>
      <input type="text" name="email" dir="ltr" value="{{ user.email or '' }}" placeholder="email@example.com">
    </div>
    <button type="submit" class="btn block">ذخیره</button>
  </form>

  <form hx-post="/auth/logout" hx-swap="none" style="margin-top:.8rem;">
    <input type="hidden" name="_csrf" value="{{ csrf_token }}">
    <button type="submit" class="btn ghost block">خروج از حساب</button>
  </form>
</div>
