<div id="auth-area">
  {% if error %}<div class="alert">{{ error }}</div>{% endif %}
  <p class="lead">شمارهٔ موبایل یا نام کاربری حساب خود را وارد کنید. اگر حسابی موجود باشد، کد بازیابی پیامک می‌شود.</p>
  <form hx-post="/auth/forgot" hx-target="#auth-area" hx-swap="outerHTML">
    <input type="hidden" name="_csrf" value="{{ csrf_token }}">
    <input type="hidden" name="next" value="{{ next }}">
    <div class="field">
      <label>شمارهٔ موبایل یا نام کاربری</label>
      <input type="text" name="identifier" dir="ltr" autocomplete="username"
             value="{{ identifier }}" required autofocus>
    </div>
    <button type="submit" class="btn block">ارسال کد بازیابی</button>
  </form>
</div>
